name: Build & Release

# Triggers:
#   1. Push a version tag:  git tag v1.0.1 && git push origin v1.0.1
#   2. Manually from Actions tab (picks up current package.json version)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Needed to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  # ── macOS ────────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Rebuilds better-sqlite3 + sodium-native for the current Electron version
      - name: Rebuild native modules
        run: npx electron-builder install-app-deps

      - name: Build macOS (Universal DMG + ZIP)
        env:
          # Skip Apple code-signing — users will "Open Anyway" in System Settings
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-mac
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
          if-no-files-found: error

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps

      - name: Build Windows (NSIS installer)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-win
          path: |
            dist/*-setup.exe
            dist/latest.yml
          if-no-files-found: error

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps

      - name: Build Linux (AppImage + deb)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml
          if-no-files-found: error

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tag name: from the pushed tag, or v + package.json version on manual dispatch
          tag_name: ${{ github.ref_name || format('v{0}', github.event.inputs.version) }}
          name: Bolt ${{ github.ref_name || format('v{0}', github.event.inputs.version) }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
