name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────
  # 🍏 macOS Build (UNIVERSAL for auto-update)
  # ─────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps

      # 🔥 Build UNIVERSAL (fixes mac auto-update issues)
      - name: Build macOS (universal)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npx electron-vite build
          npx electron-builder --mac --universal --publish never

      - name: List dist (mac)
        run: ls -lh dist

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-mac
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
          if-no-files-found: error


  # ─────────────────────────────────────────────
  # 🪟 Windows Build
  # ─────────────────────────────────────────────
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      # Fix for rollup native issue
      - name: Install Rollup Windows binary
        shell: bash
        run: npm install --no-save "@rollup/rollup-win32-x64-msvc@$(node -p "require('./node_modules/rollup/package.json').version")"

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps

      - name: Build Windows
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npx electron-vite build
          npx electron-builder --win --publish never

      - name: List dist (win)
        run: dir dist

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-win
          path: |
            dist/*.exe
            dist/*.yml
          if-no-files-found: error


  # ─────────────────────────────────────────────
  # 🚀 GitHub Release
  # ─────────────────────────────────────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-mac
          path: release-files

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-win
          path: release-files

      - name: List release files
        run: ls -lh release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Bolt ${{ github.ref_name }}
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}